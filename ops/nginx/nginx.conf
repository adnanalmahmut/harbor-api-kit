# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt / ACME challenges if needed later
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Reverse Proxy ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── SSL Certificates (place your files in ops/certs/) ───────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── TLS hardening ────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                           always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header X-XSS-Protection          "1; mode=block"                                always;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_min_length 1024;

    # ── Upload size (match your app limits) ──────────────────────────────────
    client_max_body_size 20m;

    # ── Proxy to NestJS API container ────────────────────────────────────────
    location / {
        proxy_pass         http://api:5000;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket / SSE support
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Buffer tuning
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 16k;
    }
}
