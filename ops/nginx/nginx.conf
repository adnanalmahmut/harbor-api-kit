# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt / ACME challenges if needed later
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Reverse Proxy (Behind Cloudflare) ─────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── SSL Certificates (place your files in ops/certs/) ───────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── Trust only Cloudflare as reverse proxy (Real IP) ─────────────────────
    # Cloudflare IPv4 ranges (official)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # Cloudflare IPv6 ranges (official)
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    # Use Cloudflare's real client IP header
    real_ip_header CF-Connecting-IP;
    real_ip_recursive off;

    # ── TLS hardening ────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ─────────────────────────────────────────────────────
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_min_length 1024;

    # ── Upload size (match your app limits) ──────────────────────────────────
    client_max_body_size 20m;

    # ── Proxy to NestJS API container ────────────────────────────────────────
    location / {
        proxy_pass http://api:5000;

        proxy_set_header Host              $host;

        # After real_ip_header + set_real_ip_from, $remote_addr becomes real client IP
        proxy_set_header X-Real-IP         $remote_addr;

        # IMPORTANT: overwrite any client-supplied X-Forwarded-For (do NOT append)
        proxy_set_header X-Forwarded-For   $remote_addr;

        # Preserve original scheme as seen by Nginx (https)
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        # WebSocket / SSE support
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Timeouts
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Buffer tuning
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 16k;
    }
}