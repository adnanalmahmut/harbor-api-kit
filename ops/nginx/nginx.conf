# ============================================================================
# Optional: Rate limiting zones + log filtering (http context)
# Place this block inside the main `http {}` context.
# If this file is loaded via conf.d/*.conf inside http context, it is fine here.
# ============================================================================

# General per-IP rate limit (optional)
limit_req_zone $binary_remote_addr zone=perip_general:10m rate=20r/s;

# Stricter per-IP rate limit for auth/sensitive endpoints
limit_req_zone $binary_remote_addr zone=perip_auth:10m rate=5r/s;

# Reduce noisy access logs from common scanners
map $request_uri $loggable {
    default 1;
    ~*^/(wp-admin|wp-content|wp-includes|wordpress|xmlrpc\.php|wp-login\.php) 0;
    ~*\.php$ 0;
    ~*^/(\.env|\.git|composer\.(json|lock)|phpinfo\.php|vendor/|\.htaccess) 0;
}

# Proper websocket upgrade handling
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================================================
# 1) HTTP default_server - reject unknown hosts
# ============================================================================

server {
    listen 80 default_server;
    server_name _;

    # Allow Let's Encrypt / ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Drop everything else early
    return 444;
}

# ============================================================================
# 2) HTTP redirect for the API domain only
# ============================================================================

server {
    listen 80;
    server_name api.feedogo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# 3) HTTPS default_server - reject unknown hosts
# ============================================================================

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    return 444;
}

# ============================================================================
# 4) HTTPS reverse proxy for the API domain (behind Cloudflare)
# ============================================================================

server {
    listen 443 ssl;
    http2 on;
    server_name api.feedogo.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Trust only Cloudflare proxy IP ranges (real client IP restoration)
    # Cloudflare IPv4 ranges
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # Cloudflare IPv6 ranges
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    # Use Cloudflare client IP header
    real_ip_header CF-Connecting-IP;
    real_ip_recursive off;

    # TLS hardening
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # Logs
    access_log /var/log/nginx/access.log combined if=$loggable;
    error_log  /var/log/nginx/error.log warn;

    # Compression
    gzip on;
    gzip_types application/json application/javascript text/plain text/css text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Upload size (match app limits)
    client_max_body_size 20m;

    # Drop common scanner paths before they hit Node.js
    location ~* ^/(wp-admin|wp-content|wp-includes|wordpress|xmlrpc\.php|wp-login\.php) {
        return 444;
    }

    location ~* \.php$ {
        return 444;
    }

    location ~* ^/(\.env|\.git|composer\.(json|lock)|phpinfo\.php|vendor/|\.htaccess) {
        return 444;
    }

    # Stricter rate limiting for auth endpoints (adjust path to your real API path)
    # Example path: /api/v1/auth/
    location ^~ /api/v1/auth/ {
        limit_req zone=perip_auth burst=15 nodelay;

        proxy_pass http://api:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 16k;
    }

    # Main API reverse proxy
    location / {
        # Optional general rate limit
        limit_req zone=perip_general burst=40 nodelay;

        proxy_pass http://api:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 16k;
    }
}