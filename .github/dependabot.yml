version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
