name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: saas_core_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5435/saas_core_test?schema=public
      REDIS_URL: redis://localhost:6380
      APP_ENV: test
      NODE_ENV: test
      APP_PUBLIC_URL: http://localhost:5000
      FRONTEND_PUBLIC_URL: http://localhost:3000
      BETTER_AUTH_SECRET: test_secret_must_be_long_enough_for_security_checks
      BETTER_AUTH_URL: http://localhost:5001/api/v1/auth
      REDIS_PREFIX: test-ci
      RESEND_API_KEY: re_test_ci_placeholder
      RESEND_FROM_EMAIL: test@example.com
      RESEND_FROM_NAME: CI Test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        # || true: remaining HIGH vulns are in transitive dev deps (lodash in prisma-ast)
        # not exploitable in production. Remove || true once upstream fixes land.
        run: npm audit --audit-level=high || true

      - name: Lint
        run: npm run lint:check

      - name: Prisma Generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Run Unit Tests
        run: npm run test

      - name: Run E2E Tests
        run: npm run test:e2e:ci
