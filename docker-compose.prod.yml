services:
  postgres:
    image: postgres:15-alpine
    container_name: core_platform_api_db
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - prod_network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 3g
    cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    container_name: core_platform_api_redis
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--maxmemory',
        '1gb',
        '--maxmemory-policy',
        'allkeys-lru',
      ]
    volumes:
      - redis_data_prod:/data
    networks:
      - prod_network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 10
    mem_limit: 1200m
    cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core_platform_api
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod_network
    restart: unless-stopped
    mem_limit: 1g
    cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  nginx:
    image: nginx:alpine
    container_name: core_platform_api_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - prod_network
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  prod_network:
    driver: bridge
